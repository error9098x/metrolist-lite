name: Desktop Release (DMG)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0)'
        required: false
        default: '1.0.0'

jobs:
  dmg:
    runs-on: macos-latest # Apple Silicon — produces an arm64 build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Resolve version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build DMG
        run: |
          chmod +x scripts/package-dmg.sh
          scripts/package-dmg.sh "${{ steps.ver.outputs.version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrolist-lite-${{ steps.ver.outputs.version }}-dmg
          path: build/dist/*.dmg

      - name: Attach to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: build/dist/*.dmg
          body: |
            Metrolist Lite ${{ steps.ver.outputs.version }} (macOS, arm64).

            Requires `mpv` and `yt-dlp` on PATH: `brew install mpv yt-dlp`.
